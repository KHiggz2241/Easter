<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Easter!</title>
    <style>
        body {
            background-color: #000000; /* Pure black background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #FFFFFF;
        }
        .message {
            color: #FFD700; /* Bright gold text */
            font-family: 'Arial Black', sans-serif;
            font-size: 2.5rem;
            text-align: center;
            line-height: 1.5;
            animation: flash 0.6s infinite;
        }
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="message">
        Hello Earthling,<br>
        Happy Easter!!!
    </div>
</body>
</html>

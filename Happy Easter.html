<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            color: #FFD700; /* Easter Gold */
            font-family: 'Arial Black', sans-serif;
            font-size: 3rem;
            text-align: center;
            animation: blinker 0.5s linear infinite; /* This makes it flash */
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>Hello Earthling,<br>Happy Easter!!!</h1>
</body>
</html>
